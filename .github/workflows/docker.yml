name: Deploy to Server

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_NAME: mizuki
  CONTAINER_NAME: mizuki

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    env:
      SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
      SERVER_SITE_PORT: ${{ secrets.SERVER_SITE_PORT || '8080' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check deploy secrets
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          test -n "$SERVER_HOST" || (echo "SERVER_HOST secret is required" && exit 1)
          test -n "$SERVER_USER" || (echo "SERVER_USER secret is required" && exit 1)
          test -n "$SERVER_SSH_KEY" || (echo "SERVER_SSH_KEY secret is required" && exit 1)

      - name: Build Docker image
        run: |
          docker build -t "$IMAGE_NAME:$GITHUB_SHA" .
          docker save "$IMAGE_NAME:$GITHUB_SHA" | gzip > "$IMAGE_NAME-$GITHUB_SHA.tar.gz"

      - name: Configure SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SERVER_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$SERVER_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Upload image
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          scp -P "$SERVER_PORT" "$IMAGE_NAME-$GITHUB_SHA.tar.gz" \
            "$SERVER_USER@$SERVER_HOST:/tmp/$IMAGE_NAME-$GITHUB_SHA.tar.gz"

      - name: Restart container
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
            "IMAGE_NAME='$IMAGE_NAME' CONTAINER_NAME='$CONTAINER_NAME' IMAGE_TAG='$GITHUB_SHA' SERVER_SITE_PORT='$SERVER_SITE_PORT' bash -s" <<'EOF'
          set -euo pipefail

          docker load -i "/tmp/$IMAGE_NAME-$IMAGE_TAG.tar.gz"
          docker rm -f "$CONTAINER_NAME" || true
          docker run -d \
            --name "$CONTAINER_NAME" \
            --restart unless-stopped \
            -p "127.0.0.1:$SERVER_SITE_PORT:80" \
            "$IMAGE_NAME:$IMAGE_TAG"

          rm -f "/tmp/$IMAGE_NAME-$IMAGE_TAG.tar.gz"
          docker image prune -f --filter "until=168h"
          EOF
