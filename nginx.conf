server {
	listen 80;
	server_name _;

	root /usr/share/nginx/html;
	index index.html;

	location = /healthz {
		access_log off;
		add_header Content-Type text/plain;
		return 200 "ok\n";
	}

	location ~* \.(?:avif|css|gif|ico|jpeg|jpg|js|mjs|png|svg|webp|woff|woff2)$ {
		try_files $uri =404;
		expires 30d;
		add_header Cache-Control "public, max-age=2592000, immutable";
	}

	location / {
		try_files $uri $uri/ =404;
	}

	error_page 404 /404.html;
}
